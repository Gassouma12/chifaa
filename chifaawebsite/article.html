    <main class="article-container">
        <!-- Back Button -->
        <div class="back-nav">
            <a href="voices.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                Back to Blog
            </a>
        </div>

        <!-- Article Header -->
        <article id="article-content">
            <div class="article-header">
                <div class="article-category" id="article-category"></div>
                <h1 class="article-title" id="article-title"></h1>
                <div class="article-meta">
                    <div class="article-author">
                        <img id="author-image" src="" alt="" class="article-author-image">
                        <div class="article-author-info">
                            <div class="article-author-name" id="author-name"></div>
                            <div class="article-author-role" id="author-role"></div>
                        </div>
                        <div class="article-author-socials" id="author-socials"
                            style="display: flex; gap: 8px; margin-left: 12px;"></div>
                    </div>
                    <div class="article-meta-secondary">
                        <span id="article-date"></span>
                        <span class="article-meta-divider">•</span>
                        <span id="article-read-time"></span>
                        <span class="article-meta-divider">•</span>
                        <span id="article-views"></span>
                    </div>
                </div>
            </div>

            <!-- Article Cover Image -->
            <div class="article-cover">
                <img id="article-cover-image" src="" alt="" loading="lazy">
            </div>

            <!-- Article Content -->
            <div class="article-body">
                <div id="article-text"></div>

                <!-- Article Tags -->
                <div class="article-tags" id="article-tags"></div>
            </div>
        </article>

        <!-- Related Articles -->
        <section class="related-articles">
            <h2>Related Articles</h2>
            <div class="related-grid" id="related-grid"></div>
        </section>
